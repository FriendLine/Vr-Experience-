<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Visible Social Anxiety VR Demo</title>
  <meta name="theme-color" content="#0f1720">
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#0f1720;font-family:Inter,Arial,sans-serif;color:#fff}
    #ui{position:fixed;inset:0;pointer-events:none;z-index:20}
    #panel{position:absolute;left:20px;right:20px;bottom:20px;display:flex;flex-direction:column;gap:10px;align-items:flex-start}
    #panel button,#questionBox button{pointer-events:auto;background:rgba(15,23,32,.92);color:#fff;border:1px solid rgba(255,255,255,.18);padding:12px 16px;border-radius:12px;cursor:pointer}
    #captionBox,#questionBox{max-width:820px;background:rgba(8,12,18,.84);border:1px solid rgba(255,255,255,.14);border-radius:14px;padding:14px 16px;line-height:1.45;pointer-events:auto}
    .hidden{display:none}
  </style>
</head>
<body>
<div id="ui">
  <div id="panel">
    <button id="startBtn">Start visible demo</button>
    <button id="captionToggle">Captions: On</button>
    <div id="captionBox">This upgraded demo includes visible people placeholders and a more obvious office environment.</div>
    <div id="questionBox" class="hidden"></div>
  </div>
</div>

<a-scene background="color: #0f1720" vr-mode-ui="enabled: true" renderer="colorManagement: true; physicallyCorrectLights: true">
  <a-entity id="cameraRig" position="0 1.6 1.8">
    <a-camera>
      <a-cursor color="#7FDBFF"></a-cursor>
    </a-camera>
  </a-entity>

  <a-sky id="sky" color="#243447"></a-sky>
  <a-entity light="type: ambient; intensity: 1.1; color: #ffffff"></a-entity>
  <a-entity light="type: directional; intensity: 0.7; position: 1 3 2"></a-entity>

  <a-plane id="floor" rotation="-90 0 0" width="16" height="16" color="#3b4653"></a-plane>
  <a-plane id="backWall" position="0 2 -5" width="16" height="5" color="#c9d2db"></a-plane>
  <a-plane id="leftWall" position="-8 2 0" rotation="0 90 0" width="10" height="5" color="#e3e8ee"></a-plane>
  <a-plane id="rightWall" position="8 2 0" rotation="0 -90 0" width="10" height="5" color="#e3e8ee"></a-plane>

  <a-entity id="deskScene">
    <a-box position="0 0.9 -1.7" width="2.8" height="0.08" depth="1.4" color="#7d5a43"></a-box>
    <a-box position="-1.2 0.45 -1.2" width="0.08" height="0.9" depth="0.08" color="#2f3540"></a-box>
    <a-box position="1.2 0.45 -1.2" width="0.08" height="0.9" depth="0.08" color="#2f3540"></a-box>
    <a-box position="-1.2 0.45 -2.2" width="0.08" height="0.9" depth="0.08" color="#2f3540"></a-box>
    <a-box position="1.2 0.45 -2.2" width="0.08" height="0.9" depth="0.08" color="#2f3540"></a-box>
    <a-box position="-0.45 1.25 -1.75" width="0.85" height="0.5" depth="0.05" color="#101418"></a-box>
    <a-box position="0.45 1.25 -1.75" width="0.85" height="0.5" depth="0.05" color="#101418"></a-box>
    <a-box position="0 0.98 -1.25" width="0.25" height="0.04" depth="0.18" color="#d6dce3"></a-box>
    <a-box position="0 0.52 -0.7" width="0.9" height="0.08" depth="0.9" color="#1f2933"></a-box>
    <a-box position="0 0.9 -3.9" width="3.0" height="1.8" depth="0.12" color="#6a8aa3"></a-box>
    <a-text value="Early office. Marcus reviews infrastructure materials before the team arrives." position="-1.7 2.9 -3.85" color="#0b1622" width="6"></a-text>
  </a-entity>

  <a-entity id="meetingScene" visible="false">
    <a-box position="0 0.8 -2.2" width="4.8" height="0.08" depth="1.6" color="#6f7c8c"></a-box>
    <a-box position="-2 0.4 -1.6" width="0.08" height="0.8" depth="0.08" color="#2f3540"></a-box>
    <a-box position="2 0.4 -1.6" width="0.08" height="0.8" depth="0.08" color="#2f3540"></a-box>
    <a-box position="-2 0.4 -2.8" width="0.08" height="0.8" depth="0.08" color="#2f3540"></a-box>
    <a-box position="2 0.4 -2.8" width="0.08" height="0.8" depth="0.08" color="#2f3540"></a-box>

    <a-box position="0 1.8 -4.6" width="4.8" height="1.8" depth="0.05" color="#dbe2ea"></a-box>
    <a-text value="Deal review / travel discussion" position="-1.8 2.2 -4.55" color="#152232" width="6"></a-text>

    <a-entity id="person1" position="-1.5 0 -2.2">
      <a-cylinder position="0 0.55 0" radius="0.22" height="1.1" color="#324a5f"></a-cylinder>
      <a-sphere position="0 1.3 0" radius="0.18" color="#d7b79d"></a-sphere>
    </a-entity>
    <a-entity id="person2" position="-0.5 0 -1.4">
      <a-cylinder position="0 0.55 0" radius="0.22" height="1.1" color="#805d4d"></a-cylinder>
      <a-sphere position="0 1.3 0" radius="0.18" color="#f0c9a9"></a-sphere>
    </a-entity>
    <a-entity id="marcus" position="0.8 0 -2.9">
      <a-cylinder position="0 0.55 0" radius="0.24" height="1.1" color="#1f3b57"></a-cylinder>
      <a-sphere position="0 1.3 0" radius="0.18" color="#6f4b3e"></a-sphere>
    </a-entity>
    <a-entity id="person4" position="1.8 0 -1.8">
      <a-cylinder position="0 0.55 0" radius="0.22" height="1.1" color="#556b7b"></a-cylinder>
      <a-sphere position="0 1.3 0" radius="0.18" color="#e5c1a5"></a-sphere>
    </a-entity>
  </a-entity>

  <a-entity id="managerScene" visible="false">
    <a-box position="0 0.8 -2" width="2.2" height="0.08" depth="1.1" color="#6b7280"></a-box>
    <a-entity position="-0.6 0 -2.4">
      <a-cylinder position="0 0.55 0" radius="0.22" height="1.1" color="#4e5d6c"></a-cylinder>
      <a-sphere position="0 1.3 0" radius="0.18" color="#e6b99a"></a-sphere>
    </a-entity>
    <a-entity position="0.7 0 -1.5">
      <a-cylinder position="0 0.55 0" radius="0.22" height="1.1" color="#23384f"></a-cylinder>
      <a-sphere position="0 1.3 0" radius="0.18" color="#704c3b"></a-sphere>
    </a-entity>
    <a-text value="Manager module: what helps is clarity, flexibility, and predictable support." position="-2.2 2.8 -3.8" color="#ffffff" width="7"></a-text>
  </a-entity>
</a-scene>

<script>
const scenes = {
  intro: {
    caption: 'Marcus arrives early for another day in infrastructure investing. The room is quiet, but the day is already full.',
    sky: '#243447',
    show: 'deskScene',
    next: 'meeting',
    duration: 9000
  },
  meeting: {
    caption: 'The team is visible now. Marcus is in the room, but the private calculation behind every choice is still invisible.',
    sky: '#2b3440',
    show: 'meetingScene',
    next: 'branch',
    duration: 12000
  },
  branch: {
    caption: 'Are you a people manager?',
    sky: '#101418',
    show: 'meetingScene',
    question: true
  },
  manager: {
    caption: 'Managers can reduce friction without becoming intrusive. The most helpful moves are steady, clear, and practical.',
    sky: '#1c2630',
    show: 'managerScene',
    next: 'close',
    duration: 10000
  },
  close: {
    caption: 'This is still a visual prototype, but now you can see the people and the room layout more clearly.',
    sky: '#101418',
    show: 'deskScene'
  }
};

const sceneIds = ['deskScene','meetingScene','managerScene'];
const captionBox = document.getElementById('captionBox');
const questionBox = document.getElementById('questionBox');
const startBtn = document.getElementById('startBtn');
const captionToggle = document.getElementById('captionToggle');
const sky = document.getElementById('sky');
let current = null;
let timer = null;
let captionsOn = true;

function showOnly(id){
  sceneIds.forEach(sceneId => document.getElementById(sceneId).setAttribute('visible', sceneId === id));
}
function setCaption(text){ captionBox.textContent = captionsOn ? text : ''; }
function go(sceneName){
  if (timer) clearTimeout(timer);
  current = scenes[sceneName];
  sky.setAttribute('color', current.sky);
  showOnly(current.show);
  setCaption(current.caption);
  if (current.question){
    questionBox.classList.remove('hidden');
    questionBox.innerHTML = '<div style="margin-bottom:12px">Are you a people manager?</div>';
    const yes = document.createElement('button'); yes.textContent = 'Yes'; yes.onclick = ()=>{questionBox.classList.add('hidden'); go('manager');};
    const no = document.createElement('button'); no.textContent = 'No'; no.style.marginLeft='8px'; no.onclick = ()=>{questionBox.classList.add('hidden'); go('close');};
    questionBox.append(yes,no);
    return;
  }
  if (current.next) timer = setTimeout(()=>go(current.next), current.duration || 8000);
}

startBtn.onclick = ()=>{ startBtn.style.display='none'; go('intro'); };
captionToggle.onclick = ()=>{ captionsOn = !captionsOn; captionToggle.textContent = `Captions: ${captionsOn ? 'On' : 'Off'}`; setCaption(current?.caption || ''); };
</script>
</body>
</html>
